<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamified Habit Tracker</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="app-header">
        <h1 data-i18n="appTitle">Habit Tracker</h1>
        <div class="header-actions">
            <button id="langToggle" class="lang-btn">FR</button>
            <button id="profileBtn" class="icon-btn" data-i18n-aria="profile">👤</button>
        </div>
    </header>
    <nav class="tab-nav">
        <button class="tab active" data-page="home">🏠 <span data-i18n="home">Home</span></button>
        <button class="tab" data-page="nutrition">🥗 <span data-i18n="nutrition">Nutrition</span></button>
    </nav>
    <main>
        <div id="homePage" class="page">
            <section class="level-section">
                <div class="level-info">
                    <span id="levelDisplay">Level 1</span>
                    <span id="xpDisplay">XP: 0 / 100</span>
                </div>
                <div class="xp-bar">
                    <div id="xpProgress" class="xp-progress"></div>
                </div>
            </section>
            <section class="stats-section">
                <div class="stat" id="hpStat">HP: 0</div>
                <div class="stat" id="intStat">INT: 0</div>
                <div class="stat" id="dexStat">DEX: 0</div>
            </section>
            <section class="date-nav">
                <button id="prevDay" class="nav-btn">←</button>
                <span id="currentDate" class="date-label"></span>
                <button id="nextDay" class="nav-btn">→</button>
            </section>
            <section class="habits-section">
                <h2 id="habitsHeader" data-i18n="habits">Habits</h2>
                <ul id="habitList" class="habit-list"></ul>
                <button id="addHabitBtn" class="add-btn" data-i18n="addHabit">+ Add New Habit</button>
            </section>
        </div>

        <div id="nutritionPage" class="page hidden">
            <section class="nutrition-header">
                <div class="goal-row">
                    <label><span data-i18n="goal">Objectif</span> :
                        <select id="nutritionGoal">
                            <option value="maintain" data-i18n="maintain">Maintien</option>
                            <option value="lose" data-i18n="loseWeight">Perte de poids</option>
                            <option value="gain" data-i18n="gainMuscle">Prise de muscle</option>
                        </select>
                    </label>
                    <label><span data-i18n="weight">Poids</span> : <input type="number" id="nutritionWeight" value="70" min="30" max="300" style="width:70px" /> <span data-i18n="kg">kg</span></label>
                </div>
                <div class="macro-summary">
                    <div class="macro-row">
                        <span id="calDisplay"><span data-i18n="calories">Calories</span> : 0 / 2000</span>
                        <span id="macroDisplay" class="macro-text">P: 0g  L: 0g  G: 0g  F: 0g</span>
                    </div>
                    <div class="macro-bar"><div id="calProgress" class="macro-progress"></div></div>
                    <button id="suggestBtn" class="suggest-btn">💡 Compléter</button>
                </div>
            </section>

            <section class="meal-section">
                <h3 data-i18n="todaysMeals">Repas du jour</h3>
                <div id="mealLogContainer">
                    <div class="meal-slot">
                        <span class="meal-label">🌅 <span data-i18n="breakfast">Petit-déjeuner</span></span>
                        <div id="mealBreakfast" class="meal-items"></div>
                        <button class="add-meal-btn" data-meal="breakfast">+ <span data-i18n="add">Ajouter</span></button>
                    </div>
                    <div class="meal-slot">
                        <span class="meal-label">☀️ <span data-i18n="lunch">Déjeuner</span></span>
                        <div id="mealLunch" class="meal-items"></div>
                        <button class="add-meal-btn" data-meal="lunch">+ <span data-i18n="add">Ajouter</span></button>
                    </div>
                    <div class="meal-slot">
                        <span class="meal-label">🌙 <span data-i18n="dinner">Dîner</span></span>
                        <div id="mealDinner" class="meal-items"></div>
                        <button class="add-meal-btn" data-meal="dinner">+ <span data-i18n="add">Ajouter</span></button>
                    </div>
                    <div class="meal-slot">
                        <span class="meal-label">🍿 <span data-i18n="snack">Collation</span></span>
                        <div id="mealSnack" class="meal-items"></div>
                        <button class="add-meal-btn" data-meal="snack">+ <span data-i18n="add">Ajouter</span></button>
                    </div>
                </div>
            </section>

            <div id="nutritionSubpages">
                <nav class="sub-tab-nav">
                    <button class="sub-tab active" data-subpage="foods">🥦 <span data-i18n="foods">Aliments</span></button>
                    <button class="sub-tab" data-subpage="recipes">📖 <span data-i18n="recipes">Recettes</span></button>
                </nav>

                <div id="foodsPage" class="sub-page">
                    <input type="text" id="foodSearch" class="food-search" data-i18n-placeholder="searchFood" placeholder="🔍 Rechercher un aliment..." />
                    <div class="filter-tabs">
                        <button class="filter-btn active" data-filter="all"><span data-i18n="all">Tous</span></button>
                        <button class="filter-btn" data-filter="fav">★ <span data-i18n="favorites">Favoris</span></button>
                        <button class="filter-btn" data-filter="protein"><span data-i18n="proteins">Protéines</span></button>
                        <button class="filter-btn" data-filter="carbs"><span data-i18n="carbs">Glucides</span></button>
                        <button class="filter-btn" data-filter="veg"><span data-i18n="vegetables">Légumes</span></button>
                        <button class="filter-btn" data-filter="fruit"><span data-i18n="fruits">Fruits</span></button>
                        <button class="filter-btn" data-filter="fat"><span data-i18n="fats">Lipides</span></button>
                        <button class="filter-btn" data-filter="dairy"><span data-i18n="dairy">Produits laitiers</span></button>
                    </div>
                    <div id="foodList" class="food-list"></div>
                </div>

                <div id="recipesPage" class="sub-page hidden">
                    <div id="recipeList" class="recipe-list"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add / Edit Habit Modal -->
    <div id="habitModal" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="modalTitle">Add New Habit</h2>
            <form id="habitForm">
                <label>
                    <span data-i18n="title">Title</span>
                    <input type="text" id="habitTitle" required />
                </label>
                <label>
                    <span data-i18n="category">Category</span>
                    <select id="habitCategory">
                        <option value="Health" data-i18n="health">Health</option>
                        <option value="Learning" data-i18n="learning">Learning</option>
                        <option value="Mindfulness" data-i18n="mindfulness">Mindfulness</option>
                    </select>
                </label>
                <label>
                    <span data-i18n="targetPerDay">Target per day</span>
                    <input type="text" id="habitTarget" placeholder="e.g. 5 reps" />
                </label>
                <label>
                    <span data-i18n="xpReward">XP reward</span>
                    <input type="number" id="habitXp" value="10" min="1" />
                </label>
                <div class="modal-actions">
                    <button type="submit" class="btn-primary" data-i18n="save">Save</button>
                    <button type="button" id="cancelBtn" class="btn-secondary" data-i18n="cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Food/Recipe to Meal Modal -->
    <div id="addItemModal" class="modal-overlay hidden">
        <div class="modal">
            <h3>Ajouter au repas</h3>
            <div id="addItemContent"></div>
        </div>
    </div>

    <!-- Suggestions Modal -->
    <div id="suggestionsModal" class="modal-overlay hidden">
        <div class="modal modal-wide">
            <h3>💡 Suggestions pour compléter</h3>
            <div id="suggestionsContent"></div>
        </div>
    </div>

    <script src="lang.js"></script>
    <script src="nutrition.js"></script>
    <script src="app.js"></script>
</body>
</html>
